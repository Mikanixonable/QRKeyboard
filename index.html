<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QRKeyboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='white'/><path fill='black' d='M1 1h6v6H1zM2 2v4h4V2zM3 3h2v2H3zM9 1h6v6H9zM10 2v4h4V2zM11 3h2v2h-2zM1 9h6v6H1zM2 10v4h4v-4zM3 11h2v2H3zM9 9h2v2H9zM13 9h2v2h-2zM11 11h2v2h-2zM9 13h2v2H9zM13 13h2v2h-2z'/></svg>">
</head>
<body>
  <div class="site-body">
    <nav class="left-menu-zone" aria-label="メニュー">
      <h1 class="site-title">QRKeyboard</h1>
      <div class="tabs-vertical" role="tablist" aria-label="コード規格">
        <div class="tab-group tab-group-qr" aria-label="QRコード系">
          <button class="tab" role="tab" data-standard="qr" aria-selected="true">QR</button>
          <button class="tab" role="tab" data-standard="micro" aria-selected="false">マイクロQR</button>
          <button class="tab" role="tab" data-standard="rmqr" aria-selected="false">rMQR</button>
        </div>
        <div class="tab-group tab-group-other" aria-label="非QRコード系">
          <button class="tab" role="tab" data-standard="datamatrix" aria-selected="false">DataMatrix</button>
          <button class="tab" role="tab" data-standard="aztec" aria-selected="false">Aztec</button>
          <button class="tab" role="tab" data-standard="barcode" aria-selected="false">バーコード</button>
        </div>
      </div>
    </nav>

    <main class="center-content-zone layout">
      <section class="preview" id="preview">
        <div class="content-top">
          <div class="field" id="data-field">
            <label for="data-input">データ</label>
            <textarea id="data-input" rows="2" spellcheck="false"
              placeholder="エンコードする文字列を入力">https://www.qrcode.com/</textarea>
          </div>

          <div class="field">
            <label id="color-label">色</label>
            <div class="color-row" aria-labelledby="color-label">
              <label class="color-item">
                <input type="color" id="color-fg" value="#000000">
                <span>コード</span>
              </label>
              <label class="color-item">
                <input type="color" id="color-bg" value="#ffffff">
                <span>背景</span>
              </label>
              <button type="button" class="small-button" id="color-reset">リセット</button>
            </div>
          </div>
        </div>

        <div class="content-middle" id="qr-zone">
          <div class="qr-card" id="qr-card">
            <canvas id="qr-canvas" role="img" aria-label="生成されたコード"></canvas>
            <p class="qr-message" id="qr-message" hidden></p>
            <div class="preview-toolbar">
              <span class="edit-hint" id="edit-hint" hidden>クリックでモジュールを反転できます</span>
              <button type="button" class="small-button" id="edit-reset" hidden>編集をリセット</button>
            </div>
          </div>
          <div class="content-bar" id="content-bar">
            <span class="content-label" id="content-label">内容</span>
            <span class="content-text" id="content-text"></span>
            <span class="content-status" id="content-status"></span>
          </div>
          <dl class="info" id="info"></dl>
        </div>

        <div class="content-bottom">
          <div class="field" id="ec-field">
            <label id="ec-label">誤り訂正</label>
            <div class="segmented" id="ec-control" role="radiogroup" aria-labelledby="ec-label"></div>
          </div>

          <div class="field" id="version-field">
            <label id="version-label">複雑度(型番)</label>
            <div class="version-box" id="version-control"></div>
          </div>

          <div class="field" id="barcode-text-field" hidden>
            <label id="barcode-text-label">表示</label>
            <div id="barcode-text-control"></div>
          </div>

          <div class="field" id="mask-field">
            <label id="mask-label">マスクパターン</label>
            <div class="segmented" id="mask-control" role="radiogroup" aria-labelledby="mask-label"></div>
          </div>

          <div class="save-menu" id="save-menu">
            <button type="button" class="small-button" id="save-png">PNG保存</button>
            <button type="button" class="small-button" id="save-svg">SVG保存</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="right-menu-zone" aria-label="予備メニュー"></nav>

   </div>

  <script src="qrcode.js"></script>
  <script src="datamatrix.js"></script>
  <script src="aztec.js"></script>
  <script src="barcode1d.js"></script>
  <script src="app.js"></script>
</body>
</html>
